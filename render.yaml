# Render web service blueprint for MOAP Tic Tac Toe backend
# Robust commands: Render has shown different clone paths (/opt/render/project vs /opt/render/project/src).
# These commands detect the correct backend directory at build/start time.

services:
  - type: web
    name: moap-ttt-backend
    env: node
    plan: free
    region: oregon

    buildCommand: "bash -lc 'if [ -d /opt/render/project/src/backend ]; then npm install --prefix /opt/render/project/src/backend; else npm install --prefix /opt/render/project/backend; fi'"
    startCommand: "bash -lc 'if [ -d /opt/render/project/src/backend ]; then npm start --prefix /opt/render/project/src/backend; else npm start --prefix /opt/render/project/backend; fi'"

    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: "postgresql://postgres.qwrnfgvvdrwyfuwqiejp:Cdfrnc1AtUFgMNuV@aws-1-us-east-1.pooler.supabase.com:5432/postgres"
      - key: PGSSLMODE
        value: "require"
      - key: CORS_ORIGIN
        value: "*"
      - key: MORGAN_STYLE
        value: "combined"
