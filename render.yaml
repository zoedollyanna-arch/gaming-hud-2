# Render web service blueprint for MOAP Tic Tac Toe backend
# IMPORTANT: Render repo clone root is /opt/render/project/src
# This repo has backend/package.json (not root package.json), so we cd into backend.

services:
  - type: web
    name: moap-ttt-backend
    runtime: node
    plan: free
    region: oregon

    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"

    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: "postgresql://postgres.qwrnfgvvdrwyfuwqiejp:Cdfrnc1AtUFgMNuV@aws-1-us-east-1.pooler.supabase.com:5432/postgres"
      - key: PGSSLMODE
        value: "require"
      - key: CORS_ORIGIN
        value: "*"
      - key: MORGAN_STYLE
        value: "combined"
