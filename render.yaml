# Render web service blueprint for MOAP Tic Tac Toe backend
# Force absolute paths so Render reliably finds backend/package.json.

services:
  - type: web
    name: moap-ttt-backend
    env: node
    plan: free
    region: oregon

    buildCommand: "cd /opt/render/project/backend && npm install"
    startCommand: "cd /opt/render/project/backend && npm start"

    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: "postgresql://postgres.qwrnfgvvdrwyfuwqiejp:Cdfrnc1AtUFgMNuV@aws-1-us-east-1.pooler.supabase.com:5432/postgres"
      - key: PGSSLMODE
        value: "require"
      - key: CORS_ORIGIN
        value: "*"
      - key: MORGAN_STYLE
        value: "combined"
