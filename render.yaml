# Render web service blueprint for MOAP Tic Tac Toe backend
# Deploy from repo root using root/package.json + root/server.js (no fragile cd paths).

version: 1

services:
  - type: web
    name: moap-ttt-backend
    env: node
    plan: free
    region: oregon

    rootDirectory: "."

    buildCommand: "npm install"
    startCommand: "npm start"

    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: "postgresql://postgres.qwrnfgvvdrwyfuwqiejp:Cdfrnc1AtUFgMNuV@aws-1-us-east-1.pooler.supabase.com:5432/postgres"
      - key: PGSSLMODE
        value: "require"
      - key: CORS_ORIGIN
        value: "*"
      - key: MORGAN_STYLE
        value: "combined"
